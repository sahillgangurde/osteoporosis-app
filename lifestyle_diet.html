<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>OsteoScan AI | Lifestyle & Diet</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#38debb",
                    "on-surface-variant": "#464557",
                    "surface-container-low": "#f2f3f9",
                    "tertiary": "#8f1721",
                    "primary-container": "#4a3aff",
                    "primary": "#2e02e9",
                    "background": "#f8f9ff",
                    "on-surface": "#191c20",
                    "outline": "#777588",
                    "surface-container-lowest": "#ffffff"
            },
            "fontFamily": { "headline": ["Manrope"], "body": ["Plus Jakarta Sans"] }
          }
        }
      }
    </script>
</head>
<body class="bg-background font-body text-on-surface antialiased overflow-x-hidden">

    <!-- Mobile Menu Button -->
    <button id="menu-btn" class="md:hidden fixed top-5 left-5 z-50 bg-white p-3 rounded-xl shadow-lg text-primary border border-slate-100 flex items-center justify-center">
        <span class="material-symbols-outlined">menu</span>
    </button>

    <!-- Sidebar -->
    <aside id="sidebar" class="h-screen w-72 fixed left-0 top-0 bg-[#f2f3f9] dark:bg-slate-900 flex flex-col py-8 z-50 -translate-x-full md:translate-x-0 transition-transform duration-300 shadow-xl md:shadow-none">
        <div class="px-8 mb-12 flex justify-between items-center">
            <div>
                <h1 class="font-['Manrope'] font-extrabold text-2xl tracking-tight text-[#4A3AFF]">OsteoScan</h1>
                <p class="text-xs text-slate-500 font-medium tracking-widest mt-1">CLINICAL LUXE SUITE</p>
            </div>
            <button id="close-sidebar" class="md:hidden text-slate-500 hover:text-primary">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <nav class="flex-grow">
            <ul class="space-y-1">
                <li><a class="flex items-center text-slate-500 pl-8 py-3 font-medium text-sm transition-all hover:bg-white/30" href="dashboard.html"><span class="material-symbols-outlined mr-4">grid_view</span>Dashboard</a></li>
                <li><a class="flex items-center text-[#4A3AFF] font-bold bg-white/50 rounded-l-full ml-4 pl-4 py-3 font-medium text-sm" href="ui.html"><span class="material-symbols-outlined mr-4">query_stats</span>Risk Assessments</a></li>
            </ul>
        </nav>
    </aside>

    <main class="ml-0 md:ml-72 min-h-screen p-4 md:p-16 lg:p-24">
        <header class="mb-12 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
            <div>
                <h2 class="font-headline font-extrabold text-xl md:text-5xl text-on-surface tracking-tight mb-2">Lifestyle Profile</h2>
                <div class="flex items-center space-x-4">
                    <span class="bg-primary-container/10 text-primary font-bold px-3 py-1 rounded-full text-xs tracking-wider uppercase">Step 3 of 3</span>
                    <div class="w-32 md:w-48 h-1.5 bg-surface-container-high rounded-full overflow-hidden">
                        <div class="w-full h-full bg-primary-container rounded-full"></div>
                    </div>
                </div>
            </div>
        </header>

        <section class="max-w-5xl bg-surface-container-lowest rounded-[2rem] p-5 md:p-16 lg:p-20 shadow-sm relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8">
                <span class="material-symbols-outlined text-primary/10 text-5xl md:text-8xl select-none">nutrition</span>
            </div>
            <form class="relative z-10 space-y-10" id="lifestyle-form">
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-8">
                    <!-- Body Weight -->
                    <div class="space-y-4">
                        <label class="block text-sm font-bold text-outline uppercase tracking-widest">Body Weight Category</label>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <button type="button" class="weight-btn-step3 py-4 rounded-xl border-2 border-outline-variant text-sm font-bold" data-value="Underweight">Underweight</button>
                            <button type="button" class="weight-btn-step3 py-4 rounded-xl border-2 border-outline-variant text-sm font-bold" data-value="Normal">Normal</button>
                            <button type="button" class="weight-btn-step3 py-4 rounded-xl border-2 border-outline-variant text-sm font-bold" data-value="Overweight">Overweight</button>
                        </div>
                    </div>
                    <!-- Activity -->
                    <div class="space-y-4">
                        <label class="block text-sm font-bold text-outline uppercase tracking-widest">Physical Activity</label>
                        <div class="grid grid-cols-2 gap-3">
                            <button type="button" class="activity-btn py-4 rounded-xl border-2 border-outline-variant text-sm font-bold" data-value="Sedentary">Sedentary</button>
                            <button type="button" class="activity-btn py-4 rounded-xl border-2 border-outline-variant text-sm font-bold" data-value="Active">Active</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-8">
                    <!-- Calcium -->
                    <div class="space-y-4">
                        <label class="block text-sm font-bold text-outline uppercase tracking-widest">Calcium Intake</label>
                        <div class="grid grid-cols-2 gap-3">
                            <button type="button" class="calcium-btn py-4 rounded-xl border-2 border-outline-variant text-sm font-bold" data-value="Inadequate">Inadequate</button>
                            <button type="button" class="calcium-btn py-4 rounded-xl border-2 border-outline-variant text-sm font-bold" data-value="Adequate">Adequate</button>
                        </div>
                    </div>
                    <!-- Vitamin D -->
                    <div class="space-y-4">
                        <label class="block text-sm font-bold text-outline uppercase tracking-widest">Vitamin D Intake</label>
                        <div class="grid grid-cols-2 gap-3">
                            <button type="button" class="vitamin-btn py-4 rounded-xl border-2 border-outline-variant text-sm font-bold" data-value="Insufficient">Insufficient</button>
                            <button type="button" class="vitamin-btn py-4 rounded-xl border-2 border-outline-variant text-sm font-bold" data-value="Sufficient">Sufficient</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-8">
                    <!-- Smoking -->
                    <div class="space-y-4">
                        <label class="block text-sm font-bold text-outline uppercase tracking-widest">Smoking History</label>
                        <div class="grid grid-cols-2 gap-3">
                            <button type="button" class="smoking-btn py-4 rounded-xl border-2 border-outline-variant text-sm font-bold" data-value="No">No</button>
                            <button type="button" class="smoking-btn py-4 rounded-xl border-2 border-outline-variant text-sm font-bold" data-value="Yes">Yes</button>
                        </div>
                    </div>
                    <!-- Alcohol -->
                    <div class="space-y-4">
                        <label class="block text-sm font-bold text-outline uppercase tracking-widest">Alcohol Consumption</label>
                        <div class="grid grid-cols-2 gap-3">
                            <button type="button" class="alcohol-btn py-4 rounded-xl border-2 border-outline-variant text-sm font-bold" data-value="None">None</button>
                            <button type="button" class="alcohol-btn py-4 rounded-xl border-2 border-outline-variant text-sm font-bold" data-value="Moderate/Heavy">Moderate</button>
                        </div>
                    </div>
                </div>

                <div class="pt-10 flex flex-col md:flex-row justify-between items-center gap-6">
                    <button type="button" onclick="window.location.href='medical_records.html'" class="w-full md:w-auto flex items-center justify-center gap-2 text-outline font-bold">
                        <span class="material-symbols-outlined">arrow_back</span>Back
                    </button>
                    <button type="button" id="analyze-btn" class="w-full md:w-auto bg-primary-container text-white text-lg font-extrabold py-5 px-16 rounded-2xl flex items-center justify-center gap-3 shadow-lg hover:translate-y-[-2px] transition-all">
                        Analyze My Risk <span class="material-symbols-outlined">analytics</span>
                    </button>
                </div>
            </form>
        </section>

        <footer class="mt-20 py-10 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-6 text-slate-400 text-xs">
            <p>© 2026 OsteoScan AI. All rights reserved.</p>
            <div class="flex gap-8">
                <a href="privacy.html" class="hover:text-primary transition-colors">Privacy Policy</a>
                <a href="terms.html" class="hover:text-primary transition-colors">Terms of Service</a>
            </div>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
